name: CI

on:
  push:
  pull_request:
    branches: [main]

# 同一 ref への連続 push で進行中の旧 run を自動キャンセル。
# main は merge 後の検証が後続 push でキャンセルされないように対象外にする。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: build + unit + e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # backend/.env はリポジトリに含めていないため CI で生成する。
      # backend/src/test/setup.ts は test 実行時に DATABASE_URL を test.db に上書きするので、
      # ここで設定する dev.db / SECRET は主に E2E 時の dev サーバ起動向け。
      - name: Create backend/.env (CI only)
        run: |
          echo 'DATABASE_URL="file:./dev.db"' > backend/.env
          echo 'BETTER_AUTH_SECRET="ci-secret-deterministic-deadbeef-cafebabe-1234567890abcdef"' >> backend/.env
          echo 'BETTER_AUTH_URL="http://localhost:3000"' >> backend/.env

      - name: Prisma generate
        working-directory: backend
        run: pnpm exec prisma generate

      # E2E で起動する dev サーバが使う dev.db に migrations を適用する。
      # backend Vitest は globalSetup が test.db を別途用意するため影響しない。
      - name: Apply Prisma migrations to dev DB
        working-directory: backend
        run: pnpm exec prisma migrate deploy

      # マスタ (Line / Station / StationLine) を seed する。
      # E2E の経路登録 / 駅マスタ参照は Line FK と Station 検索結果に依存するため必須。
      - name: Seed master data (Line / Station / StationLine)
        working-directory: backend
        run: pnpm exec prisma db seed

      - name: Build (frontend + backend)
        run: pnpm -r build

      - name: Backend unit tests (Vitest)
        run: pnpm --filter backend test

      - name: Frontend unit tests (Vitest)
        run: pnpm --filter frontend test

      # Playwright のブラウザ実体は ~/.cache/ms-playwright に入る。
      # バージョンをキーにキャッシュし、ヒット時はシステム依存のみ再導入する (~100MB の DL を回避)。
      - name: Get Playwright version
        id: playwright-version
        shell: bash
        run: |
          version=$(pnpm exec playwright --version | awk '{print $2}')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium --with-deps

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: E2E tests (Playwright)
        run: pnpm test:e2e
        env:
          CI: 'true'

      # 失敗時は html report に加え、test-results/ (trace.zip / screenshot / video) も保存して
      # 失敗の再現と原因特定をしやすくする。
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          retention-days: 7
